    <!--
      Web build only: pull Inter + Silkscreen/VT323 fallbacks for our display
      font + Geist Mono. The APK uses the bundled m6x11plus font (loaded from
      /fonts/m6x11plus.ttf) for nearly everything, and these external sheets
      simply fail to load offline — the browser uses the local @font-face and
      system fallbacks instead, so the APK suffers no visible regression.
      Trimming from ~25 families saves ~1MB of cold-start network for the web
      build and a noticeable connect+TLS hit when the WebView accidentally
      tries to resolve them.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
