services:
  - type: web
    name: balatro-explorer
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: NODE_ENV=production node dist/index.cjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
